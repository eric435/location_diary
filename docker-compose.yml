services:
  db:
    image: postgis/postgis:18-3.6
    container_name: location_diary_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U location_diary"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
